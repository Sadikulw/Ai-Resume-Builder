  <!-- Resume Lines -->
  <rect x="92" y="95" width="68" height="10" rx="5" fill="#7C3AED"/>
  <rect x="92" y="122" width="55" height="8" rx="4" fill="#A78BFA"/>
  <rect x="92" y="145" width="62" height="8" rx="4" fill="#A78BFA"/>
  <rect x="92" y="168" width="45" height="8" rx="4" fill="#A78BFA"/>

  <!-- AI Spark -->
  <circle cx="190" cy="190" r="28" fill="#0F172A"/>
  <path d="M190 172L195 184L208 189L195 194L190 206L185 194L172 189L185 184L190 172Z" fill="#22D3EE"/>

