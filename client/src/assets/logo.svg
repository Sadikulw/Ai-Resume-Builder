<svg width="900" height="260" viewBox="0 0 900 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="40" y1="20" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>

    <linearGradient id="glass" x1="80" y1="60" x2="190" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.95"/>
      <stop offset="1" stop-color="white" stop-opacity="0.65"/>
    </linearGradient>

    <linearGradient id="textgrad" x1="300" y1="60" x2="700" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <!-- Logo Background -->
  <rect x="20" y="20" width="220" height="220" rx="60" fill="url(#bg)"/>

  <!-- Resume Card -->
  <rect x="70" y="50" width="110" height="150" rx="28" fill="url(#glass)"/>

  <!-- Fold -->
